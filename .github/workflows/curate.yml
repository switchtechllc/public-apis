name: curate-public-apis
on:
  schedule:
    - cron: '0 6 * * 1,3,5'
  workflow_dispatch:
jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pydantic pyyaml
      - run: python tools/curate.py --domains ai,finance,docs --out dist/curated.json
      - uses: actions/upload-artifact@v4
        with:
          name: curated-public-apis
          path: dist/curated.json
